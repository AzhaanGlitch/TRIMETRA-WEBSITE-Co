<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <!-- Base Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE5A3" />
      <stop offset="30%" stop-color="#D5A361" />
      <stop offset="70%" stop-color="#8C6239" />
      <stop offset="100%" stop-color="#FFE5A3" />
    </linearGradient>
    
    <!-- Sparkle/Glitter Noise Filter -->
    <filter id="glitterNoise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise" />
      <feColorMatrix type="matrix" values="1 0 0 0 0.8  0 1 0 0 0.6  0 0 1 0 0.3  0 0 0 0.5 0" in="noise" result="coloredNoise" />
      <feComposite operator="in" in2="SourceGraphic" in="coloredNoise" result="composite" />
      <feBlend mode="overlay" in="SourceGraphic" in2="composite" />
    </filter>
  </defs>

  <!-- Pointer Outline (Deep Burgundy) -->
  <path d="M0,0 L0,22 L6,16 L12,27 L15,25 L9,14 L17,14 Z" fill="#620335" />
  
  <!-- Inner Pointer (Gold Gradient + Glitter Noise) -->
  <path d="M1,2 L1,19 L6,14 L11,25 L13,24 L8,13 L14,13 Z" fill="url(#goldGrad)" filter="url(#glitterNoise)" />
  
  <!-- Glitter dots / sparkles on top -->
  <circle cx="3" cy="5" r="0.6" fill="#FFF" opacity="0.9" />
  <circle cx="5" cy="11" r="0.8" fill="#FFF" opacity="0.9" />
  <circle cx="9" cy="8" r="0.5" fill="#FFF" opacity="0.9" />
  <circle cx="10" cy="15" r="0.7" fill="#FFF" opacity="0.9" />
</svg>
